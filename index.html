<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    background: #f9fafb;
}

.wrapper {
    display: flex;
    width: 1400px;
    height: 110vh;
}

#sidebar {
    width: 180px;
    background: #ffffff;
    padding: 10px;
    overflow-y: auto;
    border-right: 1px solid #e5e7eb;
}

#sidebar h3 {
    text-align: center;
    color: #16a34a;
    font-size: 16px;
}

#sidebar button {
    background: #ecfdf5;
    color: #166534;
    border: 1px solid #bbf7d0;
    padding: 8px;
    margin: 5px 3px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
}

#sidebar button:hover {
    background: #16a34a;
    color: white;
}

#content {
    flex: 1;
    padding: 15px;
}

.card {
    background: #ffffff;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    margin-bottom: 15px;
}

input, select {
    padding: 6px;
    margin: 4px;
    font-size: 13px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button.main-btn {
    background: #16a34a;
    color: white;
    padding: 6px 10px;
    font-size: 13px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.stats-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
}

.stat-item {
    background: #ecfdf5;
    color: #166534;
    border: 1px solid #bbf7d0;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
}

canvas {
    height: 500px !important;
}

h2 {
    font-size: 18px;
    color: #16a34a;
}
</style>

</head>

<body>

<div class="wrapper">

<div id="sidebar">
    <h3>Companies</h3>
    <div id="companyList"></div>
</div>

<div id="content">

    <h2>Stock Dashboard</h2>

    <div class="card">
        <select id="days" onchange="reloadData()">
            <option value="30">Last 30 Days</option>
            <option value="90">Last 90 Days</option>
        </select>

        <input type="text" id="symbol1" placeholder="Symbol 1">
        <input type="text" id="symbol2" placeholder="Symbol 2">
        <button class="main-btn" onclick="compareStocks()">Compare</button>

        <p id="compareResult"></p>

        <div id="statsResult" class="stats-bar"></div>
    </div>

    <div class="card">
        <canvas id="chart"></canvas>
    </div>

</div>

</div>

<script>

let currentSymbol = "INFY";
let chart;

async function loadCompanies() {
    let res = await fetch("/companies");
    let companies = await res.json();

    let container = document.getElementById("companyList");

    companies.forEach(symbol => {
        let btn = document.createElement("button");
        btn.innerText = symbol;
        btn.onclick = () => loadData(symbol);
        container.appendChild(btn);
    });
}

async function loadData(symbol) {
    currentSymbol = symbol;

    let days = document.getElementById("days").value;

    let res = await fetch(`/data/${symbol}?days=${days}`);
    let data = await res.json();

    if (!data || data.length === 0) {
        alert("No data available");
        return;
    }

    let labels = data.map(d => d.date);
    let prices = data.map(d => d.close);

    drawChart(labels, prices, symbol);
    loadStats(symbol);
}

async function loadStats(symbol) {
    let res = await fetch(`/stats/${symbol}`);
    let data = await res.json();

    let container = document.getElementById("statsResult");

    if (data.error) {
        container.innerHTML = "No stats";
        return;
    }

    container.innerHTML = `
        <div class="stat-item">52W High: ${data["52_week_high"].toFixed(2)}</div>
        <div class="stat-item">52W Low: ${data["52_week_low"].toFixed(2)}</div>
        <div class="stat-item">Avg: ${data["average_close"].toFixed(2)}</div>
        <div class="stat-item">Latest: ${data["latest_close"].toFixed(2)}</div>
        <div class="stat-item">Return: ${data["latest_daily_return"]}%</div>
    `;
}

function reloadData() {
    loadData(currentSymbol);
}

function drawChart(labels, prices, symbol) {
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: symbol,
                data: prices,
                borderColor: "#16a34a",
                backgroundColor: "rgba(22,163,74,0.2)",
                tension: 0.4,
                fill: true
            }]
        }
    });
}

async function compareStocks() {
    let s1 = document.getElementById("symbol1").value;
    let s2 = document.getElementById("symbol2").value;

    let days = document.getElementById("days").value;

    let r1 = await fetch(`/data/${s1}?days=${days}`);
    let r2 = await fetch(`/data/${s2}?days=${days}`);

    let d1 = await r1.json();
    let d2 = await r2.json();

    let labels = d1.map(d => d.date);

    let p1 = d1.map(d => d.close);
    let p2 = d2.map(d => d.close);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                { label: s1, data: p1, borderColor: "#16a34a", tension: 0.4 },
                { label: s2, data: p2, borderColor: "#dc2626", tension: 0.4 }
            ]
        }
    });

    let avg1 = p1.reduce((a,b)=>a+b,0)/p1.length;
    let avg2 = p2.reduce((a,b)=>a+b,0)/p2.length;

    document.getElementById("compareResult").innerText =
        `Avg ${s1}: ${avg1.toFixed(2)} | Avg ${s2}: ${avg2.toFixed(2)}`;
}

loadCompanies();
loadData("INFY");

</script>

</body>
</html>
